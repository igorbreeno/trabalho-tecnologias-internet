<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Pirate's Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-box {
            background: #151515;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #333;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 { font-family: 'Bebas Neue'; font-size: 3rem; color: #ffcc00; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #bbb; font-size: 0.8rem; }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            outline: none;
        }
        .input-group input:focus { border-color: #ffcc00; }
        .btn-register {
            width: 100%;
            padding: 15px;
            background: #ffcc00;
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        .back-link { display: block; margin-top: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-box">
        <h2>CRIAR CONTA</h2>
        <form>
            <div class="input-group">
                <label>NOME DE PIRATA</label>
                <input type="text" placeholder="Seu apelido no mar" required>
            </div>
            <div class="input-group">
                <label>E-MAIL</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-register">REGISTRAR TRIPULAÇÃO</button>
        </form>
        <a href="index.html" class="back-link">← Voltar</a>
    </div>
</body>
</html>
