<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tesouros - Pirate's Legacy</title>
    <style>
        /* TEMA DARK PIRATA */
        body {
            background-color: #0a0a0a;
            color: #d4af37; /* Ouro */
            font-family: Arial, sans-serif;
            margin: 0;
            text-align: center;
        }

        header {
            padding: 30px;
            border-bottom: 2px solid #d4af37;
            background: #111;
        }

       
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 40px;
        }

        .moldura {
            background: #1c1c1c;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 15px;
            width: 320px; 
            transition: 0.3s;
        }

        .moldura:hover {
            border-color: #d4af37;
            transform: scale(1.05); 
        }

        .moldura img {
            width: 100%;
            height: 250px; 
            object-fit: contain; 
            border-radius: 10px;
            background: #000;
        }

        h3 { margin: 15px 0 5px; color: #fff; }
        p { color: #888; font-size: 14px; }

        footer {
            margin-top: 50px;
            padding: 20px;
            border-top: 1px solid #333;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <img src="Imagens/uniube.html.jpg" alt="Uniube" style="height: 50px;">
        <h1>GALERIA DE TESOUROS</h1>
    </header>

    <div class="container">
        <div class="moldura">
            <img src="Imagens/almirante.png" alt="Almirante">
            <h3>Almirante</h3>
            <p>O protetor dos mares.</p>
        </div>

        <div class="moldura">
            <img src="Imagens/capitao.html.png" alt="Capitão">
            <h3>Capitão</h3>
            <p>Líder da tripulação.</p>
        </div>

        <div class="moldura">
            <img src="Imagens/navio.html.png" alt="Navio">
            <h3>Navio Pirata</h3>
            <p>Veloz e indestrutível.</p>
        </div>

        <div class="moldura">
            <img src="Imagens/katana.html.png" alt="Katana">
            <h3>Katana Relíquia</h3>
            <p>Forjada em aço lendário.</p>
        </div>
        div class="moldura">
            <img src="Imagens/uniube.jpg" alt="Uniube">
            <h3>Katana Relíquia</h3>
            <p>Forjada em aço lendário.</p>
        </div>
    </div>

    <footer>
        <p>Igor Soares | RA: 5174218 | Uniube ADS</p>
    </footer>

</body>
</html>
